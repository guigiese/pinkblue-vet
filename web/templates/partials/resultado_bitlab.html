{% if rows %}
<div class="pb-item-result-table-wrap is-compact">
  <table class="w-full text-xs">
    <thead>
      <tr class="border-b border-gray-200">
        <th class="text-left py-1.5 px-3 font-semibold text-gray-500 uppercase tracking-wide">Parametro</th>
        <th class="text-right py-1.5 px-3 font-semibold text-gray-500 uppercase tracking-wide">Resultado</th>
        <th class="text-right py-1.5 px-3 font-semibold text-gray-500 uppercase tracking-wide hidden sm:table-cell">Referencia</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-50">
      {% for row in rows %}
      <tr class="{% if row.alerta == 'red' %}bg-red-50{% elif row.alerta == 'yellow' %}bg-yellow-50{% endif %}">
        <td class="py-1.5 px-3 text-gray-700">
          {% if row.alerta == 'red' %}
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-red-500 mr-1 align-middle"></span>
          {% elif row.alerta == 'yellow' %}
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-yellow-400 mr-1 align-middle"></span>
          {% else %}
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-gray-200 mr-1 align-middle"></span>
          {% endif %}
          {{ row.nome }}
        </td>
        <td class="py-1.5 px-3 text-right font-mono font-semibold {% if row.alerta == 'red' %}text-red-700{% elif row.alerta == 'yellow' %}text-yellow-700{% else %}text-gray-800{% endif %}">
          {{ row.valor }}
        </td>
        <td class="py-1.5 px-3 text-right text-gray-400 hidden sm:table-cell">{{ row.referencia }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="pb-item-result-empty">Resultado não disponível.</p>
{% endif %}
